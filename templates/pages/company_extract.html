<section class="page" id="page-company-extract">
  <h2>Company Extractor</h2>
  <p class="page-sub">Upload a CSV with company details — DeepSeek extracts website, revenue, ownership, employees, and more.</p>

  <form id="company-form">
    <label for="co-file">Input CSV</label>
    <input type="file" id="co-file" accept=".csv" class="file-input" />
    <p style="font-size:12px;color:var(--muted);margin-top:6px">
      Required columns: <code>id, company_name, company_address, details</code>
    </p>

    <button type="submit" class="btn btn-blue" id="co-btn">⬇ Extract &amp; download</button>
    <span id="co-status" style="margin-left:14px;font-size:13px;color:var(--muted);display:none">Processing…</span>
  </form>
</section>
