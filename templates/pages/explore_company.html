<style>
  /* ── Explore Company: break out of .main max-width ── */
  #page-explore-company.active {
    position: fixed;
    left: var(--sidebar-w);
    right: 0; top: 0; bottom: 0;
    display: flex !important;
    flex-direction: column;
    background: var(--bg);
    z-index: 5;
  }

  .ec-header {
    padding: 18px 32px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .ec-header h2 { margin: 0; }

  .ec-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── List panel ── */
  .ec-list {
    width: 290px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .ec-search-wrap {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .ec-search-wrap input {
    width: 100%;
    margin: 0;
    font-size: 13px;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .ec-search-wrap input:focus { border-color: var(--accent); }

  .ec-list-count {
    padding: 5px 13px;
    font-size: 11px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .ec-items { flex: 1; overflow-y: auto; }

  .ec-item {
    padding: 9px 13px;
    border-bottom: 1px solid rgba(42,51,71,.4);
    cursor: pointer;
    transition: background .12s;
    border-left: 3px solid transparent;
  }
  .ec-item:hover  { background: rgba(255,255,255,.03); }
  .ec-item.active { background: rgba(79,142,247,.08); border-left-color: var(--accent); }

  .ec-item-id {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ec-item-id span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .ec-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--border);
  }
  .ec-dot.pass { background: var(--accent2); }

  .ec-item-sub {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ec-list-msg {
    padding: 28px 14px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  /* ── Detail panel ── */
  .ec-detail {
    flex: 1;
    overflow-y: auto;
    padding: 28px 36px;
  }

  .ec-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: 14px;
    gap: 10px;
  }
  .ec-placeholder-icon { font-size: 40px; opacity: .25; }

  .ec-detail-header { margin-bottom: 18px; }
  .ec-detail-header h3 {
    font-family: var(--mono);
    font-size: 17px;
    font-weight: 700;
    margin: 0 0 5px;
    word-break: break-all;
  }
  .ec-detail-link {
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    word-break: break-all;
  }
  .ec-detail-link:hover { text-decoration: underline; }

  .ec-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 8px;
  }
  .ec-badge.pass { background: rgba(52,201,126,.14); color: var(--accent2); }
  .ec-badge.fail { background: rgba(224,92,92,.12);  color: var(--danger); }

  .ec-fields {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 11px;
    margin: 18px 0 22px;
  }
  .ec-field {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 13px;
    position: relative;
  }
  .ec-field-lbl {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .ec-field-val {
    font-size: 13px;
    color: var(--text);
    font-family: var(--mono);
    word-break: break-all;
  }
  .ec-field-val.empty { color: var(--muted); font-style: italic; font-family: inherit; font-size: 12px; }

  /* ── Copy buttons ── */
  .ec-copy-btn {
    position: absolute;
    top: 7px; right: 7px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .04em;
    padding: 2px 7px;
    cursor: pointer;
    opacity: 0;
    transition: opacity .15s, color .15s, border-color .15s, background .15s;
    line-height: 1.6;
    font-family: inherit;
  }
  .ec-field:hover .ec-copy-btn { opacity: 1; }
  .ec-copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  .ec-copy-btn.copied { color: var(--accent2) !important; border-color: var(--accent2) !important; opacity: 1 !important; }

  .ec-md-wrap { position: relative; }
  .ec-md-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 0 0 9px;
  }
  .ec-md-copy {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .04em;
    padding: 2px 9px;
    cursor: pointer;
    opacity: 0;
    transition: opacity .15s, color .15s, border-color .15s;
    line-height: 1.6;
    font-family: inherit;
  }
  .ec-md-wrap:hover .ec-md-copy { opacity: 1; }
  .ec-md-copy:hover { color: var(--accent); border-color: var(--accent); }
  .ec-md-copy.copied { color: var(--accent2) !important; border-color: var(--accent2) !important; opacity: 1 !important; }

  .ec-section-lbl {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    margin: 0;
  }

  /* ── Markdown ── */
  .ec-markdown {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    font-size: 13.5px;
    line-height: 1.75;
    color: var(--text);
  }
  .ec-markdown h1 { font-size: 18px; font-weight: 700; margin: 0 0 12px; }
  .ec-markdown h2 { font-size: 15px; font-weight: 600; margin: 18px 0 9px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .ec-markdown h3 { font-size: 13.5px; font-weight: 600; margin: 14px 0 7px; color: var(--accent3); }
  .ec-markdown h4, .ec-markdown h5, .ec-markdown h6 { font-size: 13px; font-weight: 600; margin: 10px 0 5px; }
  .ec-markdown p { margin: 0 0 9px; }
  .ec-markdown p:last-child { margin-bottom: 0; }
  .ec-markdown ul, .ec-markdown ol { margin: 0 0 9px 18px; }
  .ec-markdown li { margin-bottom: 3px; }
  .ec-markdown strong { font-weight: 700; }
  .ec-markdown em { font-style: italic; color: var(--accent3); }
  .ec-markdown code {
    font-family: var(--mono);
    font-size: 12px;
    background: rgba(255,255,255,.07);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent3);
  }
  .ec-markdown pre {
    background: rgba(0,0,0,.3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 16px;
    overflow-x: auto;
    margin: 0 0 10px;
  }
  .ec-markdown pre code { background: none; padding: 0; color: var(--text); border-radius: 0; font-size: 12px; }
  .ec-markdown hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  .ec-markdown a {
    color: var(--accent);
    text-decoration: underline;
    text-decoration-color: rgba(79,142,247,.35);
    text-underline-offset: 2px;
    transition: text-decoration-color .15s;
    word-break: break-all;
  }
  .ec-markdown a:hover { text-decoration-color: var(--accent); }
  .ec-markdown a[target="_blank"]::after {
    content: ' ↗';
    font-size: .75em;
    opacity: .55;
    font-style: normal;
    text-decoration: none;
    display: inline-block;
  }
  .ec-markdown blockquote {
    border-left: 3px solid var(--accent);
    padding: 4px 0 4px 13px;
    margin: 0 0 9px;
    color: var(--muted);
    font-style: italic;
  }
  .ec-markdown table { width: 100%; border-collapse: collapse; margin: 0 0 10px; font-size: 13px; }
  .ec-markdown th, .ec-markdown td { border: 1px solid var(--border); padding: 6px 11px; text-align: left; }
  .ec-markdown th { background: rgba(255,255,255,.04); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; }
  .ec-no-details { color: var(--muted); font-style: italic; font-size: 13px; }

  /* ── Spinner ── */
  .ec-spinner { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--muted); font-size: 13px; gap: 9px; }
  .ec-spin { width: 15px; height: 15px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: ecspin .7s linear infinite; flex-shrink: 0; }
  @keyframes ecspin { to { transform: rotate(360deg); } }
</style>

<section class="page" id="page-explore-company">
  <div class="ec-header">
    <h2>Explore Company</h2>
    <span style="color:var(--muted);font-size:13px">company_information</span>
  </div>
  <div class="ec-body">

    <!-- Left: list -->
    <div class="ec-list">
      <div class="ec-search-wrap">
        <input type="text" id="ec-search" placeholder="Search by pool ID…" autocomplete="off" />
      </div>
      <div class="ec-list-count" id="ec-count">—</div>
      <div class="ec-items" id="ec-items">
        <div class="ec-list-msg">Click the tab to load companies.</div>
      </div>
    </div>

    <!-- Right: detail -->
    <div class="ec-detail" id="ec-detail">
      <div class="ec-placeholder">
        <div class="ec-placeholder-icon">🏢</div>
        <div>Select a company from the list</div>
      </div>
    </div>

  </div>
</section>

<script>
(function () {
  let ecLoaded = false;
  let ecSearchTimer = null;
  let ecActiveId = null;

  // ── HTML escape ──────────────────────────────────────────────
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function tryHostname(url) {
    try { return new URL(url).hostname; } catch { return url || ''; }
  }

  // ── Markdown → HTML ──────────────────────────────────────────
  function mdToHtml(text) {
    if (!text || !text.trim()) return '<p class="ec-no-details">No details available.</p>';

    function inline(s) {
      // Protect links/URLs from being escaped or double-processed
      const slots = [];
      function protect(html) {
        const idx = slots.length;
        slots.push(html);
        return '\x01' + idx + '\x01';
      }

      // 1. Protect [text](url) markdown links
      s = s.replace(/\[([^\]]*)\]\(([^)]+)\)/g, (_, text, url) =>
        protect(`<a href="${esc(url)}" target="_blank">${esc(text)}</a>`)
      );

      // 2. Protect bare URLs (http/https)
      s = s.replace(/(https?:\/\/[^\s<>"]+)/g, url =>
        protect(`<a href="${esc(url)}" target="_blank">${esc(url)}</a>`)
      );

      // 3. Escape remaining HTML
      s = esc(s);

      // 4. Inline formatting (on safe-escaped text)
      s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
      s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
      s = s.replace(/_([^_\n]+)_/g, '<em>$1</em>');
      s = s.replace(/`([^`]+)`/g, '<code>$1</code>');

      // 5. Restore protected slots
      slots.forEach((html, idx) => { s = s.split('\x01' + idx + '\x01').join(html); });
      return s;
    }

    const lines = text.split('\n');
    const out = [];
    let listItems = [];
    let listType = 'ul';
    let i = 0;

    function flushList() {
      if (!listItems.length) return;
      out.push(`<${listType}>${listItems.map(li => `<li>${li}</li>`).join('')}</${listType}>`);
      listItems = [];
    }

    while (i < lines.length) {
      const raw = lines[i];
      const line = raw.trim();

      // Fenced code block
      if (line.startsWith('```')) {
        flushList();
        const codeLines = [];
        i++;
        while (i < lines.length && !lines[i].trim().startsWith('```')) {
          codeLines.push(lines[i]);
          i++;
        }
        out.push(`<pre><code>${esc(codeLines.join('\n'))}</code></pre>`);
        i++; continue;
      }

      // Horizontal rule
      if (/^[-*_]{3,}$/.test(line)) {
        flushList(); out.push('<hr>'); i++; continue;
      }

      // Heading
      const hm = line.match(/^(#{1,6})\s+(.*)/);
      if (hm) {
        flushList();
        const level = Math.min(hm[1].length, 6);
        out.push(`<h${level}>${inline(hm[2])}</h${level}>`);
        i++; continue;
      }

      // Blockquote
      if (line.startsWith('>')) {
        flushList();
        out.push(`<blockquote>${inline(line.slice(1).trim())}</blockquote>`);
        i++; continue;
      }

      // Unordered list
      const ulm = line.match(/^[-*+]\s+(.*)/);
      if (ulm) {
        if (listType !== 'ul' && listItems.length) flushList();
        listType = 'ul';
        listItems.push(inline(ulm[1]));
        i++; continue;
      }

      // Ordered list
      const olm = line.match(/^\d+\.\s+(.*)/);
      if (olm) {
        if (listType !== 'ol' && listItems.length) flushList();
        listType = 'ol';
        listItems.push(inline(olm[1]));
        i++; continue;
      }

      // Blank line
      if (!line) { flushList(); i++; continue; }

      // Paragraph
      flushList();
      out.push(`<p>${inline(raw)}</p>`);
      i++;
    }

    flushList();
    return out.join('\n') || '<p class="ec-no-details">Empty details.</p>';
  }

  // ── Load company list ────────────────────────────────────────
  async function loadCompanies(search = '') {
    const itemsEl = document.getElementById('ec-items');
    const countEl = document.getElementById('ec-count');
    itemsEl.innerHTML = '<div class="ec-spinner"><div class="ec-spin"></div>Loading…</div>';

    try {
      const q = search.trim() ? '?search=' + encodeURIComponent(search.trim()) : '';
      const res = await fetch('/explore/companies' + q);
      if (!res.ok) { const e = await res.json(); throw new Error(e.error || res.statusText); }
      const data = await res.json();

      const label = search.trim() ? ' (filtered)' : '';
      countEl.textContent = data.length + (data.length === 1 ? ' company' : ' companies') + label;

      if (!data.length) {
        itemsEl.innerHTML = '<div class="ec-list-msg">No companies found.</div>';
        return;
      }

      itemsEl.innerHTML = '';
      data.forEach(item => {
        const el = document.createElement('div');
        el.className = 'ec-item' + (item.id === ecActiveId ? ' active' : '');
        el.dataset.id = item.id;

        const label   = esc(item.pool_id || '(no pool ID)');
        const sub     = esc(item.website || tryHostname(item.pool_id_link) || '—');
        const dotCls  = item.name_check === true ? 'ec-dot pass' : 'ec-dot';

        el.innerHTML =
          `<div class="ec-item-id"><span class="${dotCls}"></span><span>${label}</span></div>` +
          `<div class="ec-item-sub">${sub}</div>`;

        el.addEventListener('click', () => selectCompany(item.id, el));
        itemsEl.appendChild(el);
      });
    } catch (err) {
      itemsEl.innerHTML = `<div class="ec-list-msg" style="color:var(--danger)">${esc(err.message)}</div>`;
      countEl.textContent = 'Error';
    }
  }

  // ── Select company ───────────────────────────────────────────
  async function selectCompany(id, listEl) {
    document.querySelectorAll('#ec-items .ec-item').forEach(el => el.classList.remove('active'));
    if (listEl) listEl.classList.add('active');
    ecActiveId = id;

    const detail = document.getElementById('ec-detail');
    detail.innerHTML = '<div class="ec-spinner"><div class="ec-spin"></div>Loading…</div>';

    try {
      const res = await fetch('/explore/companies/' + id);
      if (!res.ok) { const e = await res.json(); throw new Error(e.error || res.statusText); }
      renderDetail(await res.json());
    } catch (err) {
      detail.innerHTML = `<div style="color:var(--danger);padding:20px">${esc(err.message)}</div>`;
    }
  }

  // ── Render detail ────────────────────────────────────────────
  function renderDetail(row) {
    const detail = document.getElementById('ec-detail');
    const pass   = row.name_check === true;

    function field(lbl, val) {
      const v = val
        ? `<div class="ec-field-val">${esc(val)}</div>`
        : `<div class="ec-field-val empty">—</div>`;
      const copyBtn = val
        ? `<button class="ec-copy-btn" data-copy="${esc(val)}">Copy</button>`
        : '';
      return `<div class="ec-field"><div class="ec-field-lbl">${lbl}</div>${v}${copyBtn}</div>`;
    }

    const date = row.created_at ? new Date(row.created_at).toLocaleString() : '—';
    const linkHtml = row.pool_id_link
      ? `<a href="${esc(row.pool_id_link)}" target="_blank" class="ec-detail-link">${esc(row.pool_id_link)}</a>`
      : '';

    detail.innerHTML = `
      <div class="ec-detail-header">
        <h3>${esc(row.pool_id || '(no pool ID)')}</h3>
        ${linkHtml}
        <br>
        <span class="ec-badge ${pass ? 'pass' : 'fail'}">${pass ? '✓ Name verified' : '✗ Not verified'}</span>
      </div>

      <div class="ec-fields">
        ${field('Website',     row.website)}
        ${field('Founded',     row.founded_year)}
        ${field('Revenue',     row.revenue)}
        ${field('Ownership',   row.ownership)}
        ${field('Employees',   row.employees)}
        <div class="ec-field">
          <div class="ec-field-lbl">Saved at</div>
          <div class="ec-field-val">${esc(date)}</div>
          <button class="ec-copy-btn" data-copy="${esc(date)}">Copy</button>
        </div>
      </div>

      <div class="ec-md-wrap">
        <div class="ec-md-header">
          <div class="ec-section-lbl">Details</div>
          <button class="ec-md-copy" data-copy="${esc(row.details || '')}">Copy raw</button>
        </div>
        <div class="ec-markdown">${mdToHtml(row.details)}</div>
      </div>
    `;
  }

  // ── Copy buttons (event delegation) ─────────────────────────
  document.getElementById('ec-detail').addEventListener('click', async (e) => {
    const btn = e.target.closest('.ec-copy-btn, .ec-md-copy');
    if (!btn) return;
    const text = btn.dataset.copy || '';
    try {
      await navigator.clipboard.writeText(text);
      const prev = btn.textContent;
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = prev; btn.classList.remove('copied'); }, 1500);
    } catch {
      btn.textContent = 'Error';
      setTimeout(() => { btn.textContent = btn.classList.contains('ec-md-copy') ? 'Copy raw' : 'Copy'; }, 1500);
    }
  });

  // ── Search debounce ──────────────────────────────────────────
  document.getElementById('ec-search').addEventListener('input', function () {
    clearTimeout(ecSearchTimer);
    ecSearchTimer = setTimeout(() => loadCompanies(this.value), 300);
  });

  // ── Auto-load when tab becomes active ───────────────────────
  const section = document.getElementById('page-explore-company');
  new MutationObserver(mutations => {
    for (const m of mutations) {
      if (m.attributeName === 'class' && section.classList.contains('active') && !ecLoaded) {
        ecLoaded = true;
        loadCompanies();
      }
    }
  }).observe(section, { attributes: true });
})();
</script>
