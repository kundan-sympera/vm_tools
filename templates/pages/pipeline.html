<section class="page" id="page-pipeline">
  <h2>Grok → Extract pipeline</h2>
  <p class="page-sub">Upload a company CSV — runs Grok enrichment then DeepSeek extraction automatically and returns the final result.</p>

  <div style="display:flex;gap:12px;margin-bottom:24px">
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px">
      <span style="color:var(--accent);font-weight:700">1</span> Grok enrichment
    </div>
    <div style="display:flex;align-items:center;color:var(--border);font-size:18px">→</div>
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px">
      <span style="color:var(--accent2);font-weight:700">2</span> DeepSeek extraction
    </div>
    <div style="display:flex;align-items:center;color:var(--border);font-size:18px">→</div>
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px">
      <span style="color:var(--accent3);font-weight:700">↓</span> CSV download
    </div>
  </div>

  <form id="pipeline-form">
    <label for="pl-file">Input CSV</label>
    <input type="file" id="pl-file" accept=".csv" class="file-input" />
    <p style="font-size:12px;color:var(--muted);margin-top:6px">
      Required columns: <code>pool_id, pool_id_link, validated_name, validated_address</code>
    </p>

    <label for="pl-prompt">Grok system prompt <span style="font-weight:400;text-transform:none;font-size:12px">(leave blank for default)</span></label>
    <textarea id="pl-prompt" rows="4" placeholder="Leave blank to use the built-in research prompt…"></textarea>

    <button type="submit" class="btn btn-blue" id="pl-btn">⬇ Run pipeline &amp; download</button>
    <span id="pl-status" style="margin-left:14px;font-size:13px;color:var(--muted);display:none">Running…</span>
  </form>
</section>
