<section class="page" id="page-zocdoc-profiles">
  <h2>ZocDoc profile scraper</h2>
  <p class="page-sub">Extract office locations from individual doctor profile pages.</p>

  <form action="/probe/zocdoc-profiles" method="post">
    <input type="hidden" name="output_format" id="zdp-fmt" value="csv" />

    <label for="zdp-url">Single profile URL</label>
    <input type="text" id="zdp-url" name="url"
      placeholder="https://www.zocdoc.com/doctor/alex-harrison-do-433823" />

    <label for="zdp-urls">— or — Multiple profile URLs <span style="font-weight:400;text-transform:none;font-size:12px">(one per line)</span></label>
    <textarea id="zdp-urls" name="urls" rows="8"
      placeholder="https://www.zocdoc.com/doctor/alex-harrison-do-433823&#10;https://www.zocdoc.com/doctor/..."></textarea>

    <div style="margin-top:20px;max-width:200px">
      <label for="zdp-wait">Page load wait (s)</label>
      <input type="number" id="zdp-wait" name="page_load_wait" value="8" min="2" max="60" />
    </div>

    <div class="fmt-toggle">
      <input type="radio" name="zdp_fmt_radio" id="zdp-csv" value="csv" checked
        onchange="document.getElementById('zdp-fmt').value='csv'"/>
      <label for="zdp-csv">CSV</label>
      <input type="radio" name="zdp_fmt_radio" id="zdp-json" value="json"
        onchange="document.getElementById('zdp-fmt').value='json'"/>
      <label for="zdp-json">JSON</label>
    </div>

    <button type="submit" class="btn btn-blue">⬇ Run &amp; download</button>
  </form>
</section>
